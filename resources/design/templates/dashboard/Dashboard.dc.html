<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Dashboard" description="Vehicle dashboard starting point — last rotation, wear alert, current positions, and tires nearing replacement" -->
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="./ds-base.js"></script>
</helmet>

<div style="min-height:100vh;background:var(--surface-page);font-family:var(--font-sans);">
  <div style="background:var(--surface-card);border-bottom:1px solid var(--border-subtle);">
    <div style="max-width:1040px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;">
      <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.Logo" size="{{ 28 }}" hint-size="150px,34px"></x-import>
      <span style="display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--text-primary);background:var(--surface-sunken);border:1px solid var(--border-subtle);padding:6px 12px;border-radius:var(--radius-pill);">
        <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.Icon" name="jeep" size="{{ 16 }}" hint-size="16px,16px"></x-import>
        '19 4Runner
      </span>
    </div>
  </div>

  <div style="max-width:1040px;margin:0 auto;padding:32px 24px 64px;">
    <h1 style="font-family:var(--font-display);font-weight:600;font-size:30px;text-transform:uppercase;letter-spacing:0.01em;color:var(--text-primary);margin:0;">Dashboard</h1>
    <p style="color:var(--text-secondary);margin:4px 0 22px;font-size:15px;">2019 Toyota 4Runner · 5 tires in rotation</p>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;">
      <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:20px;">
        <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.StatTile" label="Last rotation" value="Jun 10" sub="37 days ago" hint-size="100%,68px"></x-import>
      </div>
      <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:20px;">
        <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.StatTile" label="Odometer" value="120,495" unit="mi" mono="{{ true }}" hint-size="100%,68px"></x-import>
      </div>
      <div style="background:var(--surface-inverse);border:1px solid var(--border-inverse);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:20px;">
        <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.StatTile" tone="inverse" label="Fastest wear" value="Front R" sub="0.32 /1k mi" hint-size="100%,68px"></x-import>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.Alert" tone="warn" title="Uneven wear" hint-size="100%,64px"><b>Front right</b> is wearing 2&times; faster than the rest. Check alignment or rotate more frequently.</x-import>
    </div>

    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:16px;">
      <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border-subtle);font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:0.02em;font-size:16px;color:var(--text-primary);">Current positions</div>
        <div style="padding:18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;justify-items:center;row-gap:22px;column-gap:8px;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div style="display:flex;align-items:center;gap:6px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.PositionTag" position="FL" active="{{ true }}" size="sm" hint-size="40px,28px"></x-import><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-secondary);">T5</span></div>
            <div style="width:104px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 9 }}" label="" size="sm" hint-size="104px,34px"></x-import></div>
          </div>
          <div style="grid-row:1 / 3;">
            <svg width="74" viewBox="0 0 47.032 47.032" fill="var(--ink-300)" aria-hidden="true"><path d="M29.395,0H17.636c-3.117,0-5.643,3.467-5.643,6.584v34.804c0,3.116,2.526,5.644,5.643,5.644h11.759c3.116,0,5.644-2.527,5.644-5.644V6.584C35.037,3.467,32.511,0,29.395,0z M34.05,14.188v11.665l-2.729,0.351v-4.806L34.05,14.188z M32.618,10.773c-1.016,3.9-2.219,8.51-2.219,8.51H16.631l-2.222-8.51C14.41,10.773,23.293,7.755,32.618,10.773z M15.741,21.713v4.492l-2.73-0.349V14.502L15.741,21.713z M13.011,37.938V27.579l2.73,0.343v8.196L13.011,37.938z M14.568,40.882l2.218-3.336h13.771l2.219,3.336H14.568z M31.321,35.805v-7.872l2.729-0.355v10.048L31.321,35.805z"/></svg>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div style="display:flex;align-items:center;gap:6px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.PositionTag" position="FR" active="{{ true }}" size="sm" hint-size="40px,28px"></x-import><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-secondary);">T1</span></div>
            <div style="width:104px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 7 }}" label="" size="sm" hint-size="104px,34px"></x-import></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div style="display:flex;align-items:center;gap:6px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.PositionTag" position="RL" active="{{ true }}" size="sm" hint-size="40px,28px"></x-import><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-secondary);">T3</span></div>
            <div style="width:104px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 12 }}" label="" size="sm" hint-size="104px,34px"></x-import></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div style="display:flex;align-items:center;gap:6px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.PositionTag" position="RR" active="{{ true }}" size="sm" hint-size="40px,28px"></x-import><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-secondary);">T4</span></div>
            <div style="width:104px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 10 }}" label="" size="sm" hint-size="104px,34px"></x-import></div>
          </div>
          <div style="grid-column:1 / 4;display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div style="display:flex;align-items:center;gap:6px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.PositionTag" position="SP" active="{{ true }}" size="sm" hint-size="40px,28px"></x-import><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-secondary);">T2</span></div>
            <div style="width:104px;"><x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 6 }}" label="" size="sm" hint-size="104px,34px"></x-import></div>
          </div>
        </div>
      </div>

      <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border-subtle);font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:0.02em;font-size:16px;color:var(--text-primary);">Nearing replacement</div>
        <div style="padding:18px;display:flex;flex-direction:column;gap:16px;">
          <div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-primary);">T2 · <span style="color:var(--text-tertiary);font-weight:400;">SP</span></span><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">≈ 18,200 mi</span></div>
            <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 6 }}" label="" size="sm" hint-size="100%,34px"></x-import>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"><span style="font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--text-primary);">T1 · <span style="color:var(--text-tertiary);font-weight:400;">FR</span></span><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">≈ 26,300 mi</span></div>
            <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.TreadGauge" depth="{{ 7 }}" label="" size="sm" hint-size="100%,34px"></x-import>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
            <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.Button" variant="primary" block="{{ true }}" hint-size="100%,42px">Log Rotation</x-import>
            <x-import component-from-global-scope="TreadMarkDesignSystem_b4620a.Button" variant="ghost" size="sm" hint-size="100%,34px">View wear reports</x-import>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1040,&quot;height&quot;:720}}"></script>
</body>
</html>
